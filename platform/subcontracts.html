<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pier Foundations — Subcontracts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f7f8;--card:#fff;--ink:#1c1f23;--muted:#6b7178;--line:#e6e8eb;--accent:#f59e0b;--accent-soft:#fef3e2;--accent-ink:#9a6a06}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
.wrap{display:flex;min-height:100vh}

/* left list */
.list{flex:0 0 280px;border-right:1px solid var(--line);background:var(--card);padding:18px 0;overflow-y:auto}
.list h1{font-size:1.05rem;font-weight:700;padding:0 18px 4px}
.list .sub{font-size:.8rem;color:var(--muted);padding:0 18px 14px;border-bottom:1px solid var(--line)}
.sc-item{padding:13px 18px;cursor:pointer;border-bottom:1px solid var(--line);transition:background .12s}
.sc-item:hover{background:#fafbfc}
.sc-item.active{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.sc-item .job{font-weight:600;font-size:.92rem}
.sc-item .meta{font-size:.8rem;color:var(--muted);margin-top:2px}
.sc-item .amt{font-size:.82rem;color:var(--ink);font-weight:600;margin-top:3px}

/* detail */
.detail{flex:1;padding:24px 28px;overflow-y:auto}
.dhead{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;border-bottom:2px solid var(--accent);padding-bottom:14px;margin-bottom:18px}
.dhead h2{font-size:1.35rem;font-weight:700;letter-spacing:-.01em}
.dhead .sc-no{color:var(--muted);font-size:.9rem;margin-top:3px}
.dhead .amount{text-align:right}
.dhead .amount .n{font-size:1.5rem;font-weight:700}
.dhead .amount .l{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.cards{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px}
.card.full{grid-column:1 / -1}
.card h3{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);font-weight:700;margin-bottom:12px}
.row{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid #f1f2f4;align-items:baseline}
.row:last-child{border-bottom:none}
.row .k{flex:0 0 150px;color:var(--muted);font-size:.83rem}
.row .v{flex:1;font-size:.9rem}
.row .v.mono{font-variant-numeric:tabular-nums}
a{color:var(--ink)}

/* risk card */
.card.risk{border-color:#f6dca8;background:var(--accent-soft)}
.card.risk h3{color:var(--accent-ink)}
.risk-item{display:flex;gap:9px;padding:6px 0;font-size:.88rem;color:#5b4406}
.risk-item:before{content:"!";flex:0 0 18px;height:18px;background:var(--accent);color:#fff;border-radius:50%;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.pill{display:inline-block;font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:6px;background:#eef0f2;color:var(--muted)}
.pill.good{background:#e9f3ec;color:#2f7d4a}
.pill.warn{background:var(--accent-soft);color:var(--accent-ink)}
.scope{font-size:.9rem;line-height:1.6}
.foot{color:var(--muted);font-size:.75rem;margin-top:18px;border-top:1px solid var(--line);padding-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="list" id="scList"></div>
  <div class="detail" id="scDetail"></div>
</div>
<script src="/data/insurance-baseline.js"></script>
<script>
// One record per subcontract (scales to many). This is the 19-field data model.
var SUBCONTRACTS = [
{
  job:"SS: Indianapolis Low Barrier Shelter",
  number:"25062-0000",
  date:"06/03/2026",
  location:"1027 E. Georgia Street, Indianapolis, IN 46202",
  amount:"$69,700.00",
  amountNote:"Includes all applicable taxes & permits",
  scope:"Design and install Aggregate Piers / Vibratory Stone Columns (VSC) per proposal dated 4/20/26 and contract documents dated 3/12/26. Pier Foundations provides engineer signed & sealed submittals, furnishes & installs VSC at design locations, and provides verification testing per PF design. Materials and services.",
  party:"Shiel Sexton Concrete LLC (General Contractor)",
  partyOwner:"Owner: Shiel Sexton Company, Inc.",
  partyAddr:"902 N. Capitol Ave., Indianapolis, IN 46204",
  contactName:"Project Manager — C. Steffen",
  contactEmail:"csteffen@shielsexton.com",
  contactAP:"Accounting (ATTN: Millikin) — sscap@shielsexton.com",
  contactPhone:"Not listed in subcontract",
  insurance:"CGL $1M/occ, $2M agg, $2M products-comp (incl. XCU underground). Auto $1M CSL. WC statutory + Employers Liability $1M. Umbrella/Excess $5M occ / $5M agg ($10k retention). Additional Insured CG2010 10 01 + CG2037 (GC + Owner); waiver of subrogation; primary & non-contributory. COI via myCOI Central required BEFORE mobilization.",
  insuranceCompliance:[
    {item:"CGL — Each Occurrence", required:"$1M/occ", ours:"$1M/occ", status:"compliant"},
    {item:"CGL — General Aggregate", required:"$2M", ours:"$2M (per project)", status:"compliant", note:"Per-project aggregate is stronger than a blanket aggregate."},
    {item:"CGL — Products/Completed Ops", required:"$2M", ours:"$2M", status:"compliant"},
    {item:"XCU (explosion/collapse/underground)", required:"Included", ours:"Not stated on COI", status:"verify", note:"Confirm with MJ that the CGL has no XCU exclusion — relevant to our underground work."},
    {item:"Automobile Liability", required:"$1M CSL (any auto)", ours:"Hired/Non-Owned only ($1M)", status:"gap", note:"COI shows HNOA, not a $1M owned-auto CSL. If PF runs no titled vehicles, ask the GC to accept HNOA; otherwise broker must add auto CSL before mobilization."},
    {item:"Workers Compensation", required:"Statutory", ours:"Statutory (Liberty Mutual)", status:"compliant"},
    {item:"Employers Liability", required:"$1M", ours:"$1M / $1M / $1M", status:"compliant"},
    {item:"Umbrella / Excess", required:"$5M occ / $5M agg", ours:"$8M total ($3M + $5M excess)", status:"compliant", note:"Coverage exceeds requirement; retention $0 vs $10k allowed."},
    {item:"Additional Insured (CG 20 10 + CG 20 37)", required:"GC + Owner", ours:"Endorsement — not on COI face", status:"verify", note:"Broker to issue AI endorsement naming Shiel Sexton + Owner."},
    {item:"Waiver of Subrogation", required:"Yes", ours:"Endorsement — not on COI face", status:"verify"},
    {item:"Primary & Non-Contributory", required:"Yes", ours:"Endorsement — not on COI face", status:"verify"},
    {item:"COI delivery (myCOI Central)", required:"Before mobilization", ours:"Action — submit COI", status:"action", note:"Upload the job-specific COI with endorsements via myCOI Central prior to mobilizing."}
  ],
  billing:"AIA G702 & G703. Pencil copy to PM (csteffen@) by the 20th; approved pay app received by Accounting by NOON the 24th of each month (late = next month). Lien waiver must accompany every pay app. No change-order billing without a fully executed CO; COs itemized on G703. Attach monthly man-hours.",
  safety:"Attachment C — Safety Summary. Project-specific safety plan required; competent foreman/superintendent on site daily; named on-site daily safety lead required.",
  liquidatedDamages:{value:"None specified", flag:"good", note:"LD field blank. Confirm no LD flow-down from prime contract."},
  retainage:{value:"10%", note:"Released after the LATER of slab-on-grade completion OR 90 days after aggregate pier install — held past PF demobilization."},
  paymentTerms:{value:"Pay-when-paid", note:"Paid 11 working days after GC is paid by Owner. No outer time limit (pay-if-paid risk)."},
  payAppDue:"Noon on the 24th of each month (pencil copy by the 20th)",
  lienWaiver:{value:"Yes — required", note:"On Shiel Sexton's form, must accompany every pay app."},
  notarized:{value:"Yes", note:"Accompanying lien waiver must be notarized; AIA G702 includes a notary block."},
  bonds:"Not required",
  eo:"Not required",
  warranty:"1 year from substantial completion",
  disputes:"Indiana law; mediation then AAA arbitration in Indianapolis",
  risks:[
    "Retainage (10%) released only after slab-on-grade — another trade's work — so PF's final ~$6,970 is held past demob.",
    "Pay-when-paid with no outer limit — owner-nonpayment risk can shift to PF (pay-if-paid).",
    "Only 2 working days to cure any deficiency (incl. schedule) before GC self-corrects and back-charges cost + overhead + profit + attorney fees.",
    "7 working days (or less) to give written notice of any claim/change, or it is waived. Signed CO required before changed work.",
    "Broad indemnity with duty to defend (Indiana IC 26-2-5 limits it) — attorney review recommended.",
    "No differing-site-conditions clause — unforeseen subsurface risk currently sits on PF.",
    "Final lien waiver waives delay/acceleration/extra-work claims (even unknown) — reserve open claims before signing.",
    "Prime contract flows down but was not provided — request and confirm no LD passthrough.",
    "Completion date left blank; GC-revisable schedule; 'time is of the essence.'"
  ]
}
];

function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function row(k,v,extra){return '<div class="row"><div class="k">'+esc(k)+'</div><div class="v">'+v+(extra?' <span class="pill">'+esc(extra)+'</span>':'')+'</div></div>';}
function pill(o){var cls=o.flag==='good'?'good':(o.flag==='warn'?'warn':'warn');return '<span class="pill '+cls+'">'+esc(o.value)+'</span>'+(o.note?'<div style="color:#6b7178;font-size:.8rem;margin-top:3px">'+esc(o.note)+'</div>':'');}

function renderList(){
  var h='<h1>Subcontracts</h1><div class="sub">'+SUBCONTRACTS.length+' active contract'+(SUBCONTRACTS.length===1?'':'s')+'</div>';
  SUBCONTRACTS.forEach(function(s,i){
    h+='<div class="sc-item'+(i===0?' active':'')+'" data-i="'+i+'" onclick="selectSC('+i+')">'
      +'<div class="job">'+esc(s.job)+'</div>'
      +'<div class="meta">#'+esc(s.number)+' · '+esc(s.party.split(' (')[0])+'</div>'
      +'<div class="amt">'+esc(s.amount)+'</div></div>';
  });
  document.getElementById('scList').innerHTML=h;
}
function selectSC(i){
  document.querySelectorAll('.sc-item').forEach(function(e){e.classList.toggle('active',+e.dataset.i===i);});
  var s=SUBCONTRACTS[i];
  var h='<div class="dhead"><div><h2>'+esc(s.job)+'</h2><div class="sc-no">Subcontract #'+esc(s.number)+' · '+esc(s.date)+'</div></div>'
    +'<div class="amount"><div class="l">Subcontract Sum</div><div class="n">'+esc(s.amount)+'</div></div></div>';
  h+='<div class="cards">';
  // Overview
  h+='<div class="card full"><h3>Overview</h3>'
    +row('Project Location', esc(s.location))
    +row('Scope of Work','<span class="scope">'+esc(s.scope)+'</span>')
    +'</div>';
  // Counterparty
  h+='<div class="card"><h3>Contracting Party</h3>'
    +row('PF contracts with', esc(s.party))
    +row('', '<span style="color:#6b7178">'+esc(s.partyOwner)+'</span>')
    +row('Address', esc(s.partyAddr))
    +'</div>';
  // Contacts
  h+='<div class="card"><h3>Point of Contact</h3>'
    +row('Contact', esc(s.contactName))
    +row('Email','<a href="mailto:'+esc(s.contactEmail)+'">'+esc(s.contactEmail)+'</a>')
    +row('Accounts Payable', esc(s.contactAP))
    +row('Phone','<span style="color:#6b7178">'+esc(s.contactPhone)+'</span>')
    +'</div>';
  // Financial terms
  h+='<div class="card"><h3>Financial Terms</h3>'
    +row('Subcontract Amount', esc(s.amount)+' <span style="color:#6b7178;font-size:.8rem">('+esc(s.amountNote)+')</span>')
    +row('Liquidated Damages', pill(s.liquidatedDamages))
    +row('Retainage', pill(s.retainage))
    +row('Payment Terms', pill(s.paymentTerms))
    +row('Pay App Due', esc(s.payAppDue))
    +'</div>';
  // Compliance
  h+='<div class="card"><h3>Compliance & Requirements</h3>'
    +row('Lien Waiver', pill(s.lienWaiver))
    +row('Pay App Notarized', pill(s.notarized))
    +row('Bonds', '<span class="pill good">'+esc(s.bonds)+'</span>')
    +row('E&O Coverage', '<span class="pill good">'+esc(s.eo)+'</span>')
    +row('Warranty', esc(s.warranty))
    +row('Disputes', esc(s.disputes))
    +'</div>';
  // Insurance / Billing / Safety (full)
  h+='<div class="card full"><h3>Insurance Requirements</h3><div class="v" style="font-size:.88rem">'+esc(s.insurance)+'</div></div>';
  // Insurance compliance vs PF baseline coverage (COI)
  if (s.insuranceCompliance && s.insuranceCompliance.length) {
    var meta={
      compliant:{lbl:'Compliant', mark:'&#10003;', col:'#2f7d4a'},
      gap:{lbl:'Needs Attention', mark:'&#10007;', col:'#b3261e'},
      verify:{lbl:'Verify with Broker', mark:'&#9888;', col:'#9a6a06'},
      action:{lbl:'Action Required', mark:'&#9679;', col:'#9a6a06'}
    };
    var counts={compliant:0,gap:0,verify:0,action:0};
    s.insuranceCompliance.forEach(function(c){ if(counts[c.status]!=null) counts[c.status]++; });
    h+='<div class="card full"><h3>Insurance Compliance vs PF Baseline Coverage</h3>';
    h+='<div class="v" style="font-size:.8rem;color:#6b7178;margin-bottom:10px">Each contract requirement compared to PF\'s current COI ('
      + (window.PF_INSURANCE_BASELINE? esc(window.PF_INSURANCE_BASELINE.broker)+', as of '+esc(window.PF_INSURANCE_BASELINE.asOf) : 'baseline')
      + '). '+counts.compliant+' compliant · '+counts.gap+' needs attention · '+counts.verify+' to verify · '+counts.action+' action.</div>';
    ['gap','verify','action','compliant'].forEach(function(st){
      var rows=s.insuranceCompliance.filter(function(c){return c.status===st;});
      if(!rows.length) return;
      rows.forEach(function(c){
        h+='<div style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid #eee">';
        h+='<span style="color:'+meta[st].col+';font-weight:700;flex:0 0 16px">'+meta[st].mark+'</span>';
        h+='<div style="flex:1;font-size:.86rem"><b>'+esc(c.item)+'</b> — requires '+esc(c.required)+'; we carry '+esc(c.ours)+'.';
        if(c.note) h+=' <span style="color:#6b7178">'+esc(c.note)+'</span>';
        h+='</div></div>';
      });
    });
    h+='<div class="v" style="font-size:.74rem;color:#6b7178;margin-top:8px">Business-level comparison, not an insurance or legal opinion. Confirm endorsement items with MJ Insurance before mobilizing.</div>';
    h+='</div>';
  }
  h+='<div class="card"><h3>Billing Procedures</h3><div class="v" style="font-size:.88rem">'+esc(s.billing)+'</div></div>';
  h+='<div class="card"><h3>Safety Instructions</h3><div class="v" style="font-size:.88rem">'+esc(s.safety)+'</div></div>';
  // Risk
  h+='<div class="card risk full"><h3>Risk Exposure to PF</h3>';
  s.risks.forEach(function(r){h+='<div class="risk-item">'+esc(r)+'</div>';});
  h+='</div>';
  h+='</div>';
  h+='<div class="foot">Extracted & reviewed by Peter · Business-level summary, not legal advice · Mockup for review with Tether & Melanie</div>';
  document.getElementById('scDetail').innerHTML=h;
}
renderList(); selectSC(0);
</script>
</body>
</html>
